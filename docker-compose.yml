version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://smartpass:password@db:5432/smartpass
      - SECRET_KEY=your-secret-key-here
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - db
    volumes:
      - ./ml/models:/app/ml/models
    networks:
      - smartpass-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - smartpass-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=smartpass
      - POSTGRES_USER=smartpass
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartpass-network

volumes:
  postgres_data:

networks:
  smartpass-network:
    driver: bridge